<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
</head>
<body>
  <h1>PDF Viewer</h1>
  <app-example-pdf-viewer></app-example-pdf-viewer>

  <script>
    window.addEventListener('message', event => {
      const data = event.data;
      if (data && data.pdfSrc) {
        const pdfViewer = document.querySelector('app-example-pdf-viewer');
        if (pdfViewer) {
          pdfViewer.pdfSrc = data.pdfSrc;
        }
      }
    });
  </script>
</body>
</html>
